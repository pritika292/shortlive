# Production compose — joins the shared `pritika` Docker network on the VM and
# reads ALL runtime env (DATABASE_URL, REDIS_URL, SESSION_SECRET, IP_HASH_PEPPER,
# NODE_ENV) from /opt/pritika/_infra/shortlive.env. The file is written by
# scripts/bootstrap-vm.sh on first deploy and never touched again.
#
# For local development use docker-compose.local.yml.

networks:
  pritika:
    external: true

services:
  app:
    build: .
    container_name: shortlive
    restart: unless-stopped
    networks: [pritika]
    ports:
      - "3010:3010"
    env_file:
      - /opt/pritika/_infra/shortlive.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 384m
