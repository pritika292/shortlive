# Production compose — joins the shared `pritika` Docker network on the VM and
# reads infra credentials (POSTGRES_PASSWORD, REDIS_PASSWORD) from
# /opt/pritika/_infra/.env plus per-project secrets from
# /opt/pritika/_infra/shortlive.env. Both files live outside the repo; the
# deploy pipeline ensures shortlive.env exists before this stack is brought up.
#
# For local development use docker-compose.local.yml.

networks:
  pritika:
    external: true

services:
  app:
    build: .
    container_name: shortlive
    restart: unless-stopped
    networks: [pritika]
    ports:
      - "3010:3010"
    env_file:
      - /opt/pritika/_infra/.env
      - /opt/pritika/_infra/shortlive.env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@pritika-postgres:5432/shortlive
      REDIS_URL: redis://:${REDIS_PASSWORD}@pritika-redis:6379/1
      PORT: "3010"
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 384m
