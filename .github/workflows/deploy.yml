name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-shortlive
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_run fires for both success and failure; gate on conclusion.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy via az vm run-command
        run: |
          set -euo pipefail
          read -r -d '' SCRIPT <<'BASH' || true
          set -euo pipefail
          PROJECT=shortlive
          TARGET=/opt/pritika/${PROJECT}

          log() { printf "[deploy] %s\n" "$*"; }

          if [ ! -d "$TARGET/.git" ]; then
            log "First deploy — cloning"
            git clone --depth 1 https://github.com/pritika292/${PROJECT}.git "$TARGET"
          else
            log "Pulling latest main"
            cd "$TARGET"
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi
          cd "$TARGET"

          if [ -x "scripts/bootstrap-vm.sh" ]; then
            log "Running bootstrap-vm.sh"
            ./scripts/bootstrap-vm.sh
          fi

          log "Building and restarting containers"
          docker compose pull --quiet 2>/dev/null || true
          docker compose up -d --build --remove-orphans

          log "Pruning dangling images"
          docker image prune -f >/dev/null 2>&1 || true

          # Quick post-deploy probe
          sleep 3
          if curl -fsS -o /dev/null --max-time 5 http://localhost:3010/health; then
            log "Health check passed: /health returned 2xx"
          else
            log "WARN: /health did not return 2xx within 5s — container may still be starting"
          fi
          BASH

          az vm run-command invoke \
            --resource-group "${{ vars.AZURE_DEPLOY_RG }}" \
            --name "${{ vars.AZURE_DEPLOY_VM_NAME }}" \
            --command-id RunShellScript \
            --scripts "$SCRIPT" \
            --query "value[0].message" -o tsv | tee deploy-output.log

          if grep -q "Health check passed" deploy-output.log; then
            echo "::notice::shortlive deployed and healthy"
          else
            echo "::warning::Health probe did not confirm healthy state — verify http://${VM_PUBLIC_IP:-the-vm}:3010/health manually"
          fi
