name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-shortlive
  cancel-in-progress: false

# Opt JavaScript actions onto the runner's Node 24 ahead of the June 2026
# forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Write deploy script
        # az vm run-command runs the script under sh (waagent), not bash. Keep
        # everything POSIX-compatible.
        run: |
          cat > vm-deploy.sh <<'EOF'
          #!/bin/sh
          set -eu
          PROJECT=shortlive
          TARGET=/opt/pritika/${PROJECT}

          log() { printf '[deploy] %s\n' "$*"; }

          if [ ! -d "$TARGET/.git" ]; then
            log "First deploy — cloning"
            git clone --depth 1 https://github.com/pritika292/${PROJECT}.git "$TARGET"
          else
            log "Pulling latest main"
            cd "$TARGET"
            git fetch --depth 1 origin main
            git reset --hard origin/main
          fi
          cd "$TARGET"

          if [ -x scripts/bootstrap-vm.sh ]; then
            log "Running bootstrap-vm.sh"
            bash scripts/bootstrap-vm.sh
          fi

          log "Building and restarting containers"
          docker compose pull --quiet 2>/dev/null || true
          docker compose up -d --build --remove-orphans

          log "Pruning dangling images"
          docker image prune -f >/dev/null 2>&1 || true

          # Give the container time to migrate + listen, then probe.
          i=0
          while [ $i -lt 30 ]; do
            if curl -fsS -o /dev/null --max-time 3 http://localhost:3010/health; then
              log "Health check passed: /health returned 2xx"
              exit 0
            fi
            i=$((i + 1))
            sleep 2
          done
          log "ERROR: /health did not return 2xx after 60s"
          log "Container state:"
          docker compose ps
          log "Recent logs:"
          docker compose logs --tail=80 app || true
          exit 1
          EOF

      - name: Deploy via az vm run-command
        run: |
          set -eu
          az vm run-command invoke \
            --resource-group "${{ vars.AZURE_DEPLOY_RG }}" \
            --name "${{ vars.AZURE_DEPLOY_VM_NAME }}" \
            --command-id RunShellScript \
            --scripts @vm-deploy.sh \
            --query "value[0].message" -o tsv | tee deploy-output.log

          if grep -q "Health check passed" deploy-output.log; then
            echo "::notice::shortlive deployed and healthy"
          else
            echo "::warning::Health probe did not confirm healthy state — verify the VM manually"
            exit 1
          fi
