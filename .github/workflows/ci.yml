name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Jobs run sequentially via `needs:` so a failure short-circuits the rest of
# the pipeline instead of burning CI minutes on every checker for an
# already-broken PR. Order is cheapest first: lint, typecheck, docker-build,
# then the slowest gate (test).

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm run build

  docker-build:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (verify Dockerfile is valid)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t shortlive:ci .
          else
            echo "No Dockerfile yet; skipping docker build (block 6.1 will add it)."
          fi

  test:
    needs: docker-build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shortlive
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: shortlive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shortlive -d shortlive_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://shortlive:testpass@localhost:5432/shortlive_test
      REDIS_URL: redis://localhost:6379/1
      SESSION_SECRET: ci-test-session-secret-aaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm
      - run: npm ci
      - run: npm test
