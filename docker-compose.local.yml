# Local development dependencies for shortlive: Postgres + Redis.
# This is NOT the production compose — production runs inside the shared
# `pritika` network on the host VM via docker-compose.prod.yml (added in 6.1).
#
# Quick start:
#   docker compose up -d
#   psql $DATABASE_URL -c 'SELECT 1'
#
# Stop:
#   docker compose down
# Wipe data:
#   docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: shortlive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shortlive
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: shortlive
    ports:
      - "5432:5432"
    volumes:
      - shortlive_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlive -d shortlive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shortlive-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - shortlive_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  shortlive_pg_data:
  shortlive_redis_data:
