<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shortlive · Short URLs with live click analytics and rule-based webhooks</title>
    <meta
      name="description"
      content="URL shortener with sub-second live click analytics and rule-based webhook automation."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path fill='%2338bdf8' d='M3 21 L12 12 L8 12 L17 3 L17 7 L11 13 L15 13 Z'/><path stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 16 L20 16 L21 12 L23 22 L25 14 L27 18 L31 18'/></svg>"
    />
    <script>
      // Apply the saved theme before React mounts so there's no flash.
      // Default is dark; only "light" opts out.
      (function () {
        try {
          var p = localStorage.getItem("shortlive:theme");
          if (p !== "light") document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased selection:bg-emerald-500/30 selection:text-slate-900 dark:selection:text-white">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
